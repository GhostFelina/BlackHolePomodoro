<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>BlackHolock — live effect preview</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        height: 100%;
        overflow: hidden;
        background: #000;
        color: #cbd0da;
        font: 12px ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      #stage { position: fixed; inset: 0; display: block; }

      #hud {
        position: fixed;
        top: 12px;
        left: 14px;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(8, 9, 14, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        pointer-events: none;
        letter-spacing: 0.02em;
      }
      #hud b { color: #ff9e42; font-weight: 600; }

      #controls {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 18px;
        padding: 12px 20px;
        border-radius: 14px;
        background: rgba(8, 9, 14, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.09);
        backdrop-filter: blur(14px);
      }

      label { display: flex; align-items: center; gap: 7px; white-space: nowrap; }

      select {
        background: #12141d;
        color: #e8eaf0;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 7px;
        padding: 4px 8px;
        font: inherit;
      }

      input[type='range'] { width: 220px; accent-color: #ff9e42; }
      input[type='checkbox'] { accent-color: #ff9e42; }

      .hint { color: rgba(203, 208, 218, 0.42); }

      /* Press H for an unobstructed look at the effect. */
      body.clean #hud, body.clean #controls { display: none; }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div id="hud">starting…</div>

    <div id="controls">
      <label>effect <select id="effect"></select></label>
      <label>size <input type="range" id="growth" min="0.02" max="1" step="0.005" /></label>
      <label><input type="checkbox" id="autogrow" /> auto</label>
      <label><input type="checkbox" id="lensing" /> bend desktop</label>
      <span class="hint">space = pause · h = hide UI</span>
    </div>

    <script type="module" src="./preview.ts"></script>
  </body>
</html>
